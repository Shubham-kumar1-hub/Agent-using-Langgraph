# -------------------------------------------------------------
#  docker-compose.yml
#  Project : Multi-Tool AI Agent with Human-in-the-Loop
# -------------------------------------------------------------
#  docker-compose lets you configure and run your container
#  with a single command instead of a long docker run command.
# -------------------------------------------------------------

version: "3.9"

services:

  # This is my main chatbot application
  chatbot:

    # Building the image from the Dockerfile in the current folder
    build: .

    # Giving the running container a friendly name
    container_name: langgraph-hitl-chatbot

    ports:
      - "8501:8501"

    # Format: ./local-folder:/app/folder-inside-container
    volumes:
      # FAISS indexes — PDF vector stores persist across restarts
      - ./faiss_indexes:/app/faiss_indexes
      # SQLite database — conversation history persists across restarts
      - ./chatbot.db:/app/chatbot.db

    env_file:
      - .env

    restart: unless-stopped
